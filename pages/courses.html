<!DOCTYPE html>
<html lang="en">
<head>
<link rel="stylesheet" href="../theme.css?v=3">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>All Courses · The Recursive Tarot</title>
<meta name="description" content="Every course in the Recursive Tarot — the history, how the cards can work, the honest questions, the Golden Dawn, and how to contribute — each with a cover from the library.">
<link rel="icon" type="image/svg+xml" href="../public/favicon.svg?v=2">
<link rel="stylesheet" href="../style.css?v=5">
<style>
  /* All-courses gallery. Data: course/_courses.json (the catalog) + tarot/_collection.json
     (deck covers, so a course thumbnail follows its deck's art). Thumbnails are
     letterboxed, never cropped — the whole card shows (house rule). */
  main.wrap{max-width:1080px;margin:0 auto;padding:0 18px 60px}
  .hero{text-align:center;padding:30px 18px 6px;max-width:720px;margin:0 auto}
  .hero h1{font-family:var(--serif-display,Georgia);font-weight:600;font-size:clamp(30px,6vw,48px);margin:0;color:var(--ink)}
  .hero h1 .gold{color:var(--gold)}
  .hero .tag{font-family:var(--serif-body,Georgia);font-style:italic;color:var(--ink-soft);margin:12px auto 0;max-width:52ch}
  .group{margin:38px 0 0}
  .group h2{font-family:var(--serif-display,Georgia);font-weight:600;font-size:clamp(19px,3vw,24px);margin:0 0 14px;color:var(--ink)}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
  .ccard{display:flex;flex-direction:column;background:var(--surface,#fff);border:1px solid var(--line-soft,#e3dccc);
    border-radius:12px;overflow:hidden;text-decoration:none;color:var(--ink);transition:transform .15s, box-shadow .15s, border-color .15s}
  .ccard:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(60,50,30,.10);border-color:var(--gold)}
  .ccard .cover{height:150px;background:var(--bg,#faf8f3);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .ccard .cover img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block}
  .ccard .cover .noimg{font-family:var(--serif-display,Georgia);font-size:2rem;color:var(--mut,#8a8272)}
  .ccard .body{padding:13px 15px 15px;display:flex;flex-direction:column;gap:6px;flex:1}
  .ccard h3{margin:0;font-size:1.02rem;line-height:1.3;font-family:var(--serif-display,Georgia);font-weight:600}
  .ccard .blurb{font-size:.85rem;color:var(--ink-soft);line-height:1.5}
  .ccard .go{margin-top:auto;font-size:.85rem;font-weight:600;color:var(--gold)}
  .loading{text-align:center;color:var(--mut,#8a8272);padding:60px 0;font-style:italic}
</style>
</head>
<body>
<script src="../site-header.js?v=45"></script>
<site-header active="course"></site-header>

<main class="wrap">
  <div class="hero">
    <h1>All <span class="gold">Courses</span></h1>
    <p class="tag">Everything the Recursive Tarot teaches — the history, the honest questions, the traditions,
      and how to join in. Read to know yourself, not to be told your fate.</p>
  </div>
  <div id="root"><p class="loading">Loading the courses…</p></div>
</main>

<script>
(async function () {
  const root = document.getElementById('root');
  let cat, col;
  try {
    [cat, col] = await Promise.all([
      fetch('../course/_courses.json').then(r => r.json()),
      fetch('../tarot/_collection.json').then(r => r.json()).catch(() => ({ grammars: [] })),
    ]);
  } catch (e) {
    root.innerHTML = '<p class="loading">Could not load the course catalog.</p>';
    return;
  }
  const coverBySlug = Object.fromEntries((col.grammars || []).map(g => [g.slug, g.cover_image_url]));
  const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  root.innerHTML = (cat.groups || []).map(group => {
    const cards = (group.courses || []).map(c => {
      const img = c.thumb || coverBySlug[c.deck] || '';
      const cover = img
        ? `<img loading="lazy" src="${esc(img)}" alt="">`
        : '<span class="noimg">☙</span>';
      return `<a class="ccard" href="course-viewer.html?course=${esc(c.id)}">
        <div class="cover">${cover}</div>
        <div class="body">
          <h3>${esc(c.title)}</h3>
          <p class="blurb">${esc(c.blurb)}</p>
          <span class="go">Read →</span>
        </div>
      </a>`;
    }).join('');
    return `<section class="group"><h2>${esc(group.name)}</h2><div class="cards">${cards}</div></section>`;
  }).join('');
})();
</script>

<script src="../site-footer.js"></script>
<site-footer base="../"></site-footer>
<script src="../assistant.js" defer></script>
</body>
</html>
