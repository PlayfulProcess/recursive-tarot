<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Perform — recordable karaoke player</title>
<style>
  :root{ --bg:#140f28; --ink:#f6f1ff; --dim:#6a5a92; --hi:#ffd54a; --word:#ff7eb6; }
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:"Baloo 2","Comic Sans MS",system-ui,sans-serif;overflow:hidden}
  #stage{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3vh;padding:4vh 6vw}
  #plate{width:min(70vw,1000px);aspect-ratio:16/9;border-radius:24px;overflow:hidden;background:#0003;
         box-shadow:0 20px 70px rgba(0,0,0,.5);border:4px solid rgba(255,255,255,.1)}
  #plate img,#plate svg{width:100%;height:100%;object-fit:cover;display:block}
  #lines{text-align:center;max-width:80vw}
  .line{font-size:clamp(28px,5.2vw,64px);font-weight:800;line-height:1.45;color:var(--dim);letter-spacing:1px;
        transition:color .15s;margin:.2em 0}
  .line.active{color:var(--ink)}
  .w{padding:0 .08em;border-radius:.12em;transition:color .1s,background .1s}
  .line.active .w.spoken{color:var(--hi)}
  .w.now{color:#140f28;background:var(--word)}
</style>
</head>
<body>
<div id="stage"><div id="plate"></div><div id="lines"></div></div>
<audio id="au"></audio>
<script>
(function(){
  "use strict";
  var qs = new URLSearchParams(location.search);
  var stage=document.getElementById('lines'), plate=document.getElementById('plate'), au=document.getElementById('au');
  var M=null, timeline=[], total=0, startT=0, raf=0, playAudio = qs.get('audio')!=='off';

  function buildTimeline(){
    var t=0, gap=(M.gap!=null?M.gap:1.0);
    timeline = M.passages.map(function(p){
      var dur = p.audioDur || (p.marks&&p.marks.length? p.marks[p.marks.length-1].t1 : 4);
      var seg = { p:p, start:t, end:t+dur };
      t += dur + gap; return seg;
    });
    total = t;
  }

  function renderPassage(p){
    plate.innerHTML = p.image_url ? '<img src="'+p.image_url+'">' : (p.svg||'');
    stage.innerHTML='';
    (p.lines||[]).forEach(function(line,li){
      var d=document.createElement('div'); d.className='line'; d.dataset.li=li;
      line.split(/\s+/).forEach(function(w,wi){
        var s=document.createElement('span'); s.className='w'; s.dataset.li=li; s.dataset.wi=wi; s.textContent=w+' ';
        d.appendChild(s);
      });
      stage.appendChild(d);
    });
  }

  var curSeg=null, curAudio=null;
  function tick(now){
    var t=(now-startT)/1000;
    if(t>=total){ finish(); return; }
    var seg=timeline.find(function(s){return t>=s.start && t<s.end;}) || null;
    if(seg && seg!==curSeg){ curSeg=seg; renderPassage(seg.p); playSeg(seg); }
    if(seg){
      var lt=t-seg.start, marks=seg.p.marks||[];
      stage.querySelectorAll('.line').forEach(function(L){L.classList.remove('active');});
      var nowMark=null;
      marks.forEach(function(m){
        var span=stage.querySelector('.w[data-li="'+m.line+'"][data-wi="'+m.wi+'"]');
        if(!span) return;
        if(lt>=m.t1){ span.classList.add('spoken'); span.classList.remove('now'); }
        else if(lt>=m.t0 && lt<m.t1){ nowMark=m; span.classList.add('now'); span.classList.remove('spoken'); }
        else { span.classList.remove('now','spoken'); }
      });
      var activeLine = nowMark? nowMark.line : (function(){var last=-1;marks.forEach(function(m){if(lt>=m.t0)last=m.line;});return last;})();
      var L=stage.querySelector('.line[data-li="'+activeLine+'"]'); if(L) L.classList.add('active');
    }
    raf=requestAnimationFrame(tick);
  }

  function playSeg(seg){
    if(!playAudio || !seg.p.audio) return;
    try{ au.src=seg.p.audio; au.currentTime=0; au.play().catch(function(){}); }catch(e){}
  }

  function finish(){ cancelAnimationFrame(raf); window.__done=true; document.title='DONE'; }

  // Playwright hooks
  window.__ready=false; window.__done=false;
  window.__start=function(){ startT=performance.now(); raf=requestAnimationFrame(tick); };
  window.__manifest=function(m){ M=m; buildTimeline(); window.__ready=true; window.__total=total; };

  // load manifest: ?manifest=URL  (or window.__manifest(obj) injected by the recorder)
  var url=qs.get('manifest');
  if(url){ fetch(url).then(function(r){return r.json();}).then(window.__manifest)
            .catch(function(e){ document.title='ERR '+e; }); }
})();
</script>
</body>
</html>
