name: Rebuild meta + deploy Pages

# Auto-rebuilds the aggregated meta-grammar whenever a deck changes, then publishes
# the repo (incl. genealogy.html) to GitHub Pages. So "add tarot/<deck>/grammar.json
# respecting the structure → push" makes the genealogy graph update with no manual step.
# (Enable once: Settings → Pages → Source = "GitHub Actions".)

on:
  push:
    # dev merged back into main (Jul 2026) and the dev branch was deleted — Pages serves main.
    # claude/website-content-cards-plan-xwn8lj added Jul 15 2026 so the content publish pass
    # deploys as it lands; remove it from this list once that branch merges into main.
    branches: [main, claude/website-content-cards-plan-xwn8lj]
    paths:
      - 'tarot/**'
      - 'scripts/build_meta_grammar.py'
      - 'genealogy.html'
      - 'index.html'
      - 'viewers/**'
      - 'pages/**'
      - 'course/**'
      - 'site-header.js'
  workflow_dispatch:

permissions:
  contents: write   # to commit the regenerated meta
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild meta-grammar
        run: python scripts/build_meta_grammar.py

      - name: Commit regenerated meta (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- tarot/all-decks-many-lenses/grammar.json; then
            git add tarot/all-decks-many-lenses/grammar.json
            git commit -m "chore: rebuild meta-grammar [skip ci]"
            git push
          else
            echo "meta unchanged"
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deploy
        uses: actions/deploy-pages@v4
